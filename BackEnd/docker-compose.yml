version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    # SQL Server has no ARM image; on Apple Silicon Docker runs it via Rosetta
    platform: linux/amd64
    container_name: ecommerce-sqlserver
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Root@12345"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  # One-shot helper: waits for SQL Server, then runs init.sql
  # (creates ECommerceDB, the 5 tables and the sample data), then exits.
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: ecommerce-sqlserver-init
    depends_on:
      - sqlserver
    volumes:
      - ./Database/init.sql:/init.sql:ro
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "Waiting for SQL Server to accept connections..."
        for i in $$(seq 1 60); do
          /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "Root@12345" -C -Q "SELECT 1" >/dev/null 2>&1 && break
          sleep 2
        done
        echo "Running init.sql..."
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "Root@12345" -C -i /init.sql
        echo "Database initialization finished."

volumes:
  sqlserver_data:
